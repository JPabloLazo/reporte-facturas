<div class="max-w-3xl">
    <h2 class="text-lg font-semibold text-gray-800 mb-6">Configuración</h2>

    <!-- LLM Providers -->
    <div class="bg-white rounded-lg shadow-sm border p-6 mb-6">
        <h3 class="text-md font-semibold text-gray-700 mb-4">Proveedores de IA</h3>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Proveedor default</label>
                <select id="cfg-llm-provider" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                    <option value="anthropic">Anthropic</option>
                    <option value="openai">OpenAI</option>
                    <option value="openrouter">OpenRouter</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Anthropic API Key</label>
                <input type="password" id="cfg-anthropic-key" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="sk-ant-...">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">OpenAI API Key</label>
                <input type="password" id="cfg-openai-key" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="sk-...">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">OpenRouter API Key</label>
                <input type="password" id="cfg-openrouter-key" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="sk-or-...">
            </div>

            <hr class="my-4">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Modelo — Extraer facturas</label>
                <div class="relative">
                    <select id="cfg-model-extract" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                        <option value="">Cargando...</option>
                    </select>
                    <input id="cfg-model-extract-search" type="text" placeholder="🔍 Filtrar modelos..." class="hidden mt-1 w-full border border-gray-300 rounded-lg px-3 py-1.5 text-xs">
                </div>
                <p class="text-xs text-gray-400 mt-1">Mejor precisión en español</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Modelo — Fallback resúmenes</label>
                <div class="relative">
                    <select id="cfg-model-fallback" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                        <option value="">Cargando...</option>
                    </select>
                    <input id="cfg-model-fallback-search" type="text" placeholder="🔍 Filtrar modelos..." class="hidden mt-1 w-full border border-gray-300 rounded-lg px-3 py-1.5 text-xs">
                </div>
                <p class="text-xs text-gray-400 mt-1">Ideal para leer fotos de WhatsApp</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Modelo — Conciliación dudosa</label>
                <div class="relative">
                    <select id="cfg-model-cheap" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                        <option value="">Cargando...</option>
                    </select>
                    <input id="cfg-model-cheap-search" type="text" placeholder="🔍 Filtrar modelos..." class="hidden mt-1 w-full border border-gray-300 rounded-lg px-3 py-1.5 text-xs">
                </div>
                <p class="text-xs text-gray-400 mt-1">Muy económico, suficiente</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Modelo — Redactar emails</label>
                <div class="relative">
                    <select id="cfg-model-email" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                        <option value="">Cargando...</option>
                    </select>
                    <input id="cfg-model-email-search" type="text" placeholder="🔍 Filtrar modelos..." class="hidden mt-1 w-full border border-gray-300 rounded-lg px-3 py-1.5 text-xs">
                </div>
                <p class="text-xs text-gray-400 mt-1">Mejor redacción profesional</p>
            </div>
        </div>
    </div>

    <!-- Email SMTP -->
    <div class="bg-white rounded-lg shadow-sm border p-6 mb-6">
        <h3 class="text-md font-semibold text-gray-700 mb-4">Email</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">SMTP Host</label>
                <input type="text" id="cfg-smtp-host" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" value="smtp.gmail.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">SMTP Port</label>
                <input type="number" id="cfg-smtp-port" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" value="587">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
                <input type="text" id="cfg-smtp-user" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="tucorreo@gmail.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                <input type="password" id="cfg-smtp-pass" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">Email del responsable</label>
                <input type="email" id="cfg-responsable-email" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="resp@corp.com">
            </div>
        </div>
    </div>

    <!-- VISA Cards -->
    <div class="bg-white rounded-lg shadow-sm border p-6 mb-6">
        <h3 class="text-md font-semibold text-gray-700 mb-4">Tarjetas VISA — Usuarios</h3>
        <div class="overflow-x-auto">
            <table class="w-full text-sm" id="cards-table">
                <thead>
                    <tr class="bg-gray-50 border-b">
                        <th class="text-left py-2 px-3 font-medium text-gray-600">Número Tarjeta</th>
                        <th class="text-left py-2 px-3 font-medium text-gray-600">Usuario</th>
                        <th class="text-left py-2 px-3 font-medium text-gray-600">Email</th>
                        <th class="text-center py-2 px-3 font-medium text-gray-600">Acción</th>
                    </tr>
                </thead>
                <tbody id="cards-tbody"></tbody>
            </table>
        </div>
        <button id="btn-add-card" class="mt-4 text-blue-600 text-sm font-medium hover:text-blue-700">
            + Agregar tarjeta
        </button>
    </div>

    <!-- Save Button -->
    <div class="flex justify-end">
        <button id="btn-save-config" class="bg-blue-600 text-white px-6 py-2 rounded-lg text-sm hover:bg-blue-700 transition-colors">
            Guardar configuración
        </button>
    </div>
</div>

<!-- Modal: Add Card -->
<div id="add-card-modal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 w-full max-w-md mx-4">
        <h3 class="text-lg font-semibold text-gray-800 mb-4">Agregar tarjeta</h3>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Número de tarjeta (últimos 4 dígitos)</label>
                <input type="text" id="add-card-number" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" maxlength="4" placeholder="1234">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
                <input type="text" id="add-card-user" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="Nombre del responsable">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="add-card-email" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="email@correo.com">
            </div>
        </div>
        <div class="flex justify-end gap-3 mt-6">
            <button id="add-card-cancel" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Cancelar</button>
            <button id="add-card-save" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700 transition-colors">Guardar</button>
        </div>
    </div>
</div>
