<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Facturas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-800">Reporte Facturas</h1>
            <span class="text-sm text-gray-500" id="drive-status">Drive: no conectado</span>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 mt-4">
        <div class="flex border-b border-gray-200">
            <button class="tab-btn px-6 py-3 text-sm font-medium border-b-2 border-blue-600 text-blue-600" data-tab="procesar">Procesar</button>
            <button class="tab-btn px-6 py-3 text-sm font-medium text-gray-500 hover:text-gray-700" data-tab="config">Configuración</button>
            <button class="tab-btn px-6 py-3 text-sm font-medium text-gray-500 hover:text-gray-700" data-tab="historial">Historial</button>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <script src="/static/js/main.js"></script>
    {% block scripts %}{% endblock %}

<!-- Error Modal -->
<div id="error-modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black bg-opacity-50" onclick="closeErrorModal()"></div>
    <div class="relative mx-auto mt-20 max-w-md bg-white rounded-lg shadow-xl p-6">
        <div class="flex items-center gap-3 mb-4">
            <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center text-red-600 text-xl font-bold">!</div>
            <h3 id="error-modal-title" class="text-lg font-semibold text-gray-800">Error</h3>
        </div>
        <p id="error-modal-message" class="text-sm text-gray-600 mb-2"></p>
        <p id="error-modal-suggestion" class="text-sm text-gray-500 mb-6"></p>
        <button onclick="closeErrorModal()" class="w-full bg-gray-800 text-white rounded-lg px-4 py-2 text-sm font-medium hover:bg-gray-700 transition-colors">Aceptar</button>
    </div>
</div>

<!-- Email Preview Modal -->
<div id="email-modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black bg-opacity-50" onclick="closeEmailModal()"></div>
    <div class="relative mx-auto mt-10 max-w-2xl bg-white rounded-lg shadow-xl max-h-[80vh] overflow-hidden">
        <div class="flex items-center justify-between p-4 border-b">
            <h3 class="text-lg font-semibold text-gray-800">Vista previa de emails</h3>
            <button onclick="closeEmailModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
        </div>
        <div id="email-drafts-container" class="p-4 overflow-y-auto max-h-[55vh] space-y-4">
        </div>
        <div class="p-4 border-t flex justify-between items-center">
            <button onclick="closeEmailModal()" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Cancelar</button>
            <button id="btn-send-emails" onclick="sendEmailsViaMailto()" class="px-6 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">
                Enviar emails
            </button>
        </div>
    </div>
</div>
</body>
</html>
